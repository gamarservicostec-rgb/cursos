services:
  database:
    image: mysql:8.0
    container_name: cursos-gt-db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: cursos_gt
    ports:
      - "3306:3306"
    volumes:
      - database_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: cursos-gt-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    depends_on:
      - database

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cursos-gt-frontend
    ports:
      - "3001:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend

volumes:
  database_data:
